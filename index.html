<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ヘキサ・ディベート</title>
<style>
:root{
  --bg:#eef3fb;
  --grid:#dfe7f3;
  --text:#182230;
  --muted:#5c6878;
  --line:#cfdae9;

  --tray-bg:#dde7f5;
  --tray-line:#bfccdf;

  --hex-w:146px;
  --hex-h:126px;
  --tray-w:188px;

  --core-fill-1:#f7e7a3;
  --core-fill-2:#eaca59;
  --core-line:#c69400;

  --time-fill-1:#b1d3ff;
  --time-fill-2:#79adf6;
  --time-line:#3d7fe0;

  --structure-fill-1:#e0c0ff;
  --structure-fill-2:#c892fa;
  --structure-line:#8b4dd7;

  --social-fill-1:#ffd1bf;
  --social-fill-2:#ffab82;
  --social-line:#de6d37;

  --debate-fill-1:#abeecf;
  --debate-fill-2:#6dd3a0;
  --debate-line:#169b68;

  --shadow:0 8px 20px rgba(20,30,60,.12);
  --shadow-strong:0 18px 34px rgba(20,30,60,.20);
  --hud-shadow:0 10px 24px rgba(20,30,60,.10);
}
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}
body{
  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}
html,body{
  margin:0;height:100%;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;
  background:
    radial-gradient(circle at 1px 1px,var(--grid) 1.2px,transparent 0) 0 0/28px 28px,
    linear-gradient(180deg, #f5f8fe 0%, var(--bg) 100%);
  color:var(--text);
}
#app{position:relative;width:100vw;height:100vh;overflow:hidden}
#viewport{
  position:absolute;inset:0;overflow:hidden;
  touch-action:none;
}
#workspace{
  position:absolute;
  left:0;top:0;
  width:2400px;
  height:1600px;
  transform:translate(0px,0px);
  transform-origin:0 0;
}
#viewport.panning{cursor:grabbing}

#tray{
  position:absolute;left:0;top:0;bottom:0;width:var(--tray-w);
  background:
    linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,0) 120px),
    var(--tray-bg);
  border-right:1px solid var(--tray-line);
  box-shadow:0 0 0 1px rgba(255,255,255,.45) inset, 8px 0 28px rgba(40,54,84,.08);
  overflow-y:auto;overflow-x:hidden;
  padding:18px 0 calc(var(--hex-h) + 26px);
  z-index:50;
  scrollbar-width:thin;
}
#tray::-webkit-scrollbar{width:8px}
#tray::-webkit-scrollbar-thumb{background:rgba(100,115,145,.42);border-radius:8px}
.group-block{padding:0 0 6px}
.group-label{
  font-size:11px;font-weight:900;letter-spacing:.08em;
  color:var(--muted);margin:10px 0 8px 16px; position:relative; z-index:1;
}
.hex .marker{
  position:absolute;
  top:8px;
  left:50%;
  transform:translateX(-50%);
  font-size:30px;
  line-height:1;
  font-weight:900;
  text-shadow:
    -1px -1px 0 #fff,
    1px -1px 0 #fff,
    -1px 1px 0 #fff,
    1px 1px 0 #fff,
    0 0 6px rgba(255,255,255,.85);
  pointer-events:none;
}
.hex .label{
  position:relative;
  z-index:1;
}
.hex{
  width:var(--hex-w);height:var(--hex-h);
  display:flex;align-items:center;justify-content:center;
  text-align:center;padding:16px 16px 15px;
  font-size:20px;font-weight:900;line-height:1.2;
  color:var(--text);
  clip-path:polygon(25% 4%,75% 4%,96% 50%,75% 96%,25% 96%,4% 50%);
  border:3px solid var(--line);
  box-shadow:var(--shadow);
  user-select:none;
  transform-origin:center center;
  will-change:left,top,transform;
  letter-spacing:.01em;
  text-wrap:balance;
  position:relative;
}
.hex::before{
  content:"";
  position:absolute;inset:7px;
  clip-path:inherit;
  background:linear-gradient(180deg, rgba(255,255,255,.24), rgba(255,255,255,0) 58%);
  pointer-events:none;
}
.hex::after{
  content:"";
  position:absolute;inset:0;
  clip-path:inherit;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.24), inset 0 -1px 0 rgba(0,0,0,.05);
  pointer-events:none;
}
.hex .marker{
  position:absolute;
  top:8px;
  left:50%;
  transform:translateX(-50%);
  font-size:30px;
  line-height:1;
  font-weight:900;
  text-shadow:
    -1px -1px 0 #fff,
    1px -1px 0 #fff,
    -1px 1px 0 #fff,
    1px 1px 0 #fff,
    0 0 6px rgba(255,255,255,.85);
  pointer-events:none;
}
.hex .label{
  position:relative;
  z-index:1;
}
#tray .hex{
  position:relative;
  margin:0 auto 10px;
  touch-action:pan-y;
}
#tray .hex:active{transform:scale(.985)}
#workspace .hex{
  position:absolute;
  touch-action:none;
  transition:transform 90ms ease, box-shadow 110ms ease, filter 110ms ease;
}
#workspace .hex.dragging{
  z-index:9999;
  box-shadow:var(--shadow-strong);
  transform:scale(1.045);
  filter:saturate(1.05);
}
#workspace .hex.from-tray{
  opacity:.98;
}
#workspace .hex.extracted{
  box-shadow:0 20px 38px rgba(20,30,60,.24);
  transform:scale(1.06);
}
#workspace .hex.snap-candidate{
  box-shadow:
    0 0 0 4px rgba(255,255,255,.86),
    0 0 0 13px rgba(71,121,230,.20),
    0 20px 46px rgba(71,121,230,.30),
    var(--shadow-strong);
}
#workspace .hex.snap-flash{
  animation:snapPulse 420ms cubic-bezier(.18,.9,.2,1);
}
#workspace .hex.drop-flash{
  animation:dropSettle 220ms ease-out;
}
#workspace .hex.spawn-flash{
  animation:spawnPop 520ms cubic-bezier(.18,.9,.2,1);
}
@keyframes spawnPop{
  0%{
    transform:scale(.72);
    opacity:.18;
    box-shadow:
      0 0 0 0 rgba(80,120,220,0),
      0 0 0 0 rgba(255,255,255,0),
      var(--shadow-strong);
  }
  28%{
    transform:scale(1.16);
    opacity:1;
    box-shadow:
      0 0 0 10px rgba(80,120,220,.18),
      0 0 0 18px rgba(255,255,255,.65),
      0 18px 40px rgba(80,120,220,.22),
      var(--shadow-strong);
  }
  62%{
    transform:scale(.97);
  }
  100%{
    transform:scale(1);
    opacity:1;
    box-shadow:var(--shadow);
  }
}
@keyframes snapPulse{
  0%{transform:scale(1.02)}
  22%{transform:scale(1.16)}
  55%{transform:scale(.96)}
  78%{transform:scale(1.05)}
  100%{transform:scale(1)}
}
@keyframes dropSettle{
  0%{transform:scale(1.04)}
  100%{transform:scale(1)}
}
.hex.core{background:linear-gradient(180deg,var(--core-fill-1),var(--core-fill-2));border-color:var(--core-line)}
.hex.time{background:linear-gradient(180deg,var(--time-fill-1),var(--time-fill-2));border-color:var(--time-line)}
.hex.structure{background:linear-gradient(180deg,var(--structure-fill-1),var(--structure-fill-2));border-color:var(--structure-line)}
.hex.social{background:linear-gradient(180deg,var(--social-fill-1),var(--social-fill-2));border-color:var(--social-line)}
.hex.debate{background:linear-gradient(180deg,var(--debate-fill-1),var(--debate-fill-2));border-color:var(--debate-line)}


#editToggle{
  position:absolute;right:14px;top:14px;z-index:40;
  width:132px;
  height:48px;
  border-radius:15px;
  padding:0 12px;
  font-size:14px;font-weight:800;color:var(--text);
}
#editToggle.active{
  background:#eef4ff;
  border-color:#8fb0ef;
  box-shadow:0 0 0 4px rgba(80,120,220,.10), var(--hud-shadow);
}
#addCoreBtn{
  position:absolute;right:14px;top:70px;z-index:40;
  width:132px;
  border-radius:15px;
  padding:11px 12px;
  font-size:14px;font-weight:800;color:var(--text);
  display:none;
}
#addCoreBtn.show{display:block}
#workspace .hex.core .label{
  max-width:88px;
  display:-webkit-box;
  -webkit-box-orient:vertical;
  -webkit-line-clamp:2;
  overflow:hidden;
  line-clamp:2;
  font-size:18px;
  line-height:1.08;
  word-break:keep-all;
  overflow-wrap:anywhere;
}


#coreEditor{
  position:absolute;
  z-index:80;
  display:none;
  gap:8px;
  align-items:center;
  background:rgba(255,255,255,.96);
  border:1px solid var(--line);
  border-radius:14px;
  box-shadow:var(--hud-shadow);
  padding:8px;
  backdrop-filter: blur(6px);
  max-width:min(92vw, 320px);
}
#coreEditor.show{display:flex}
#coreEditor input{
  width:144px;
  border:1px solid #cfd8e6;
  border-radius:10px;
  padding:9px 10px;
  font-size:14px;
  font-weight:700;
  color:var(--text);
  outline:none;
  background:#fff;
}
#coreEditor input:focus{
  border-color:#86a8ea;
  box-shadow:0 0 0 3px rgba(90,130,220,.14);
}
#coreEditor button{
  border:1px solid var(--line);
  background:#fff;
  border-radius:10px;
  padding:9px 10px;
  font-size:13px;
  font-weight:800;
  color:var(--text);
}

.floating{
  position:absolute;z-index:40;
  background:rgba(255,255,255,.94);
  border:1px solid var(--line);
  box-shadow:var(--hud-shadow);
  backdrop-filter: blur(6px);
}
#clearBtn{
  left:206px;top:14px; width:112px;
  border-radius:15px;
  padding:11px 15px;
  font-size:14px;font-weight:800;color:var(--text);
}
#trash{
  position:absolute;left:206px;top:78px;z-index:40;
  width:112px;height:112px;border-radius:18px;
  border:2px dashed #d66767;background:rgba(255,255,255,.95);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  gap:6px;color:#ba3c3c;box-shadow:var(--hud-shadow);
  transition:transform 90ms ease, background 90ms ease, border-color 90ms ease, box-shadow 90ms ease;
  font-weight:900;font-size:14px;
}
#trash .icon{font-size:28px;line-height:1}
#trash.active{
  transform:scale(1.06);
  background:#ffebeb;
  border-color:#d94141;
  box-shadow:0 0 0 7px rgba(217,65,65,.12), var(--hud-shadow);
}

@media (max-width:900px){
  :root{ --hex-w:136px; --hex-h:118px; --tray-w:176px; }
  .hex{font-size:18px}
  #clearBtn{left:184px;top:8px; width:100px}
  #trash{left:184px;top:64px;width:100px;height:104px}
}
</style>
</head>
<body>
<div id="app">
  <div id="viewport"><div id="workspace"></div></div>
  <div id="tray"></div>
  <button id="clearBtn" class="floating">全リセット</button>
  <button id="editToggle" class="floating">基本構造リライト</button>
  <button id="addCoreBtn" class="floating">基本ヘキサゴン追加</button>
  <div id="coreEditor"><input id="coreEditorInput" maxlength="8" /><button id="coreEditorOk">OK</button><button id="coreEditorCancel">閉じる</button></div>
  <div id="trash"><span class="icon">🗑️</span><span>削除</span></div>
</div>

<script>
const coreItems = ['一般的な意見','筆者の主張','根拠','具体例','結論'];
const groups = [
  { label: '歴史学者', className: 'time', items: ['過去','背景','変化','未来'] },
  { label: 'アナリスト', className: 'structure', items: ['前提','原因','影響','経済'] },
  { label: '政治家', className: 'social', items: ['文化','比較','リスク','政治'] },
  { label: '記者', className: 'debate', items: ['根拠','具体例','反論','対案'] }
];

const viewport = document.getElementById('viewport');
const workspace = document.getElementById('workspace');
const tray = document.getElementById('tray');
const clearBtn = document.getElementById('clearBtn');
const editToggle = document.getElementById('editToggle');
const addCoreBtn = document.getElementById('addCoreBtn');
const coreEditor = document.getElementById('coreEditor');
const coreEditorInput = document.getElementById('coreEditorInput');
const coreEditorOk = document.getElementById('coreEditorOk');
const coreEditorCancel = document.getElementById('coreEditorCancel');
const trash = document.getElementById('trash');

function cssNum(name){ return parseFloat(getComputedStyle(document.documentElement).getPropertyValue(name)); }
function getHexW(){ return cssNum('--hex-w'); }
function getHexH(){ return cssNum('--hex-h'); }
function stepX(){ return getHexW() * 0.75; }
function stepY(){ return getHexH() * 0.50; }
function snapRadius(){ return Math.max(42, getHexW() * 0.28); }


const markerCycle = [
  { text:'', color:'transparent' },
  { text:'♥', color:'#d94141' },
  { text:'♕', color:'#caa100' }
];

let panX = 0;
let panY = 0;
let panState = null;

function applyPan(){
  workspace.style.transform = `translate(${panX}px, ${panY}px)`;
}

function updateMarker(el){
  const marker = el.querySelector('.marker');
  if (el.dataset.markerLocked === '1') {
    marker.textContent = '';
    marker.style.color = 'transparent';
    return;
  }
  const idx = parseInt(el.dataset.markIndex || '0', 10) || 0;
  const item = markerCycle[idx];
  marker.textContent = item.text;
  marker.style.color = item.color;
}


function setHexLabel(el, text){
  el.dataset.label = text;
  const labelEl = el.querySelector('.label');
  if (labelEl) labelEl.textContent = text;
}

function findOpenCoreSpot(){
  const occupied = new Set(
    Array.from(workspace.querySelectorAll('.hex.core')).map(el => {
      const x = parseFloat(el.style.left) || 0;
      const y = parseFloat(el.style.top) || 0;
      const snap = candidateSnapPositions(x, y);
      return snap ? `${snap.q},${snap.r}` : '';
    })
  );
  const candidates = [
    [5,1],[5,2],[4,3],[3,3],[2,3],[5,0],[6,1],[6,2],[4,4],[3,4]
  ];
  for (const [q,r] of candidates) {
    if (!occupied.has(`${q},${r}`)) return gridToPosition(q, r);
  }
  return gridToPosition(5, 2);
}
function cycleMarker(el){
  if (el.dataset.markerLocked === '1') return;
  const idx = parseInt(el.dataset.markIndex || '0', 10) || 0;
  el.dataset.markIndex = String((idx + 1) % markerCycle.length);
  updateMarker(el);
}

let rewriteMode = false;
let coreEditTarget = null;

function updateRewriteUI(){
  editToggle.classList.toggle('active', rewriteMode);
  addCoreBtn.classList.toggle('show', rewriteMode);
}

function openCoreEditor(targetEl, initialText){
  coreEditTarget = targetEl || null;
  coreEditorInput.value = (initialText || '').slice(0, 8);

  const anchorRect = targetEl ? targetEl.getBoundingClientRect() : addCoreBtn.getBoundingClientRect();
  const appRect = document.getElementById('app').getBoundingClientRect();

  coreEditor.classList.add('show');
  coreEditor.style.left = '0px';
  coreEditor.style.top = '0px';

  const editorWidth = Math.min(coreEditor.offsetWidth || 260, appRect.width - 16);
  const editorHeight = coreEditor.offsetHeight || 56;

  let left = anchorRect.left - appRect.left;
  let top = anchorRect.bottom - appRect.top + 8;

  const minLeft = trayWidth() + 12;
  const maxLeft = appRect.width - editorWidth - 8;
  left = Math.max(minLeft, Math.min(maxLeft, left));

  const maxTop = appRect.height - editorHeight - 8;
  top = Math.max(8, Math.min(maxTop, top));

  coreEditor.style.left = `${left}px`;
  coreEditor.style.top = `${top}px`;

  coreEditorInput.focus();
  coreEditorInput.select();
}

function closeCoreEditor(){
  coreEditor.classList.remove('show');
  coreEditTarget = null;
}

function applyCoreEditor(){
  const text = coreEditorInput.value.replace(/\s+/g, ' ').trim().slice(0, 8);
  if (!text) {
    closeCoreEditor();
    return;
  }
  if (coreEditTarget) {
    setHexLabel(coreEditTarget, text);
    triggerSpawnEffect(coreEditTarget);
    const rect = coreEditTarget.getBoundingClientRect();
    const vp = viewport.getBoundingClientRect();
    pulseViewportAt(rect.left - vp.left + rect.width/2, rect.top - vp.top + rect.height/2);
  } else {
    const pos = findOpenCoreSpot();
    const el = createBoardHex(text, 'core', pos.x, pos.y);
    triggerSpawnEffect(el);
    pulseViewportAt(pos.x + getHexW()/2 + panX, pos.y + getHexH()/2 + panY);
  }
  closeCoreEditor();
}
const DRAG_THRESHOLD = 10;
let zCounter = 10;
let trayPending = null;
let dragState = null;
let rafMove = 0;

function makeHex(label, className){
  const el = document.createElement('div');
  el.className = `hex ${className}`;
  el.dataset.label = label;
  el.dataset.kind = className;
  el.dataset.markIndex = '0';
  el.dataset.markerLocked = className === 'core' ? '1' : '0';
  el.dataset.coreEditable = className === 'core' ? '1' : '0';

  const marker = document.createElement('div');
  marker.className = 'marker';
  const labelEl = document.createElement('div');
  labelEl.className = 'label';
  labelEl.textContent = label;

  el.appendChild(marker);
  el.appendChild(labelEl);
  updateMarker(el);
  return el;
}

function fillTray(){
  tray.innerHTML = '';
  groups.forEach(group => {
    const block = document.createElement('div');
    block.className = 'group-block';
    const title = document.createElement('div');
    title.className = 'group-label';
    title.textContent = group.label;
    block.appendChild(title);
    group.items.forEach(item => {
      const hex = makeHex(item, group.className);
      hex.dataset.source = 'tray';
      hex.addEventListener('pointerdown', startTrayPointerDown);
      block.appendChild(hex);
    });
    tray.appendChild(block);
  });
}

function addBackToTray(label, className){
  const blocks = Array.from(tray.querySelectorAll('.group-block'));
  const block = blocks.find(b => {
    const title = b.querySelector('.group-label');
    return title && title.textContent === (
      className === 'time' ? '歴史学者' :
      className === 'structure' ? 'アナリスト' :
      className === 'social' ? '政治家' :
      className === 'debate' ? '記者' : '骨組み'
    );
  });
  if (!block) return;
  const hex = makeHex(label, className);
  hex.dataset.source = 'tray';
  hex.addEventListener('pointerdown', startTrayPointerDown);

  const existing = Array.from(block.querySelectorAll('.hex'));
  const order = (groups.find(g => g.className === className)?.items || []).indexOf(label);
  const before = existing.find(h => {
    const idx = (groups.find(g => g.className === className)?.items || []).indexOf(h.dataset.label);
    return idx > order;
  });
  if (before) block.insertBefore(hex, before);
  else block.appendChild(hex);
}



function triggerSpawnEffect(el){
  el.classList.remove('spawn-flash');
  void el.offsetWidth;
  el.classList.add('spawn-flash');
  setTimeout(()=>el.classList.remove('spawn-flash'), 560);
  if(navigator.vibrate) navigator.vibrate([12, 18, 12]);
}

function pulseViewportAt(x, y){
  const ring = document.createElement('div');
  ring.style.position = 'absolute';
  ring.style.left = `${x - 18}px`;
  ring.style.top = `${y - 18}px`;
  ring.style.width = '36px';
  ring.style.height = '36px';
  ring.style.borderRadius = '999px';
  ring.style.pointerEvents = 'none';
  ring.style.border = '3px solid rgba(80,120,220,.28)';
  ring.style.boxShadow = '0 0 0 6px rgba(255,255,255,.7)';
  ring.style.opacity = '1';
  ring.style.transform = 'scale(.6)';
  ring.style.transition = 'transform 420ms cubic-bezier(.18,.9,.2,1), opacity 420ms ease-out';
  viewport.appendChild(ring);
  requestAnimationFrame(() => {
    ring.style.transform = 'scale(2.8)';
    ring.style.opacity = '0';
  });
  setTimeout(() => ring.remove(), 460);
}

function createBoardHex(label, className, x, y){
  const el = makeHex(label, className);
  el.style.left = `${x}px`;
  el.style.top = `${y}px`;
  el.style.zIndex = ++zCounter;
  el.addEventListener('pointerdown', startDragExisting);
  workspace.appendChild(el);
  return el;
}

function trayWidth(){ return tray.getBoundingClientRect().width; }

function pointerToWorkspace(clientX, clientY){
  const rect = viewport.getBoundingClientRect();
  return { x: clientX - rect.left - panX, y: clientY - rect.top - panY };
}

function constrain(x, y){
  const minX = trayWidth() + 12 - panX;
  return {
    x: Math.max(minX, x),
    y: y
  };
}

function snapAnchorX(){ return trayWidth() + 84 + getHexW()/2; }
function snapAnchorY(){ return 72 + getHexH()/2; }

function gridToPosition(q, r){
  const HEX_W = getHexW(), HEX_H = getHexH();
  const centerX = snapAnchorX() + q * stepX();
  const centerY = snapAnchorY() + r * HEX_H + (Math.abs(q % 2) * stepY());
  return { x: centerX - HEX_W/2, y: centerY - HEX_H/2 };
}

function candidateSnapPositions(x, y){
  const HEX_W = getHexW(), HEX_H = getHexH();
  const cx = x + HEX_W / 2;
  const cy = y + HEX_H / 2;
  const qApprox = Math.round((cx - snapAnchorX()) / stepX());
  let best = null;

  for(let q = qApprox - 3; q <= qApprox + 3; q++){
    const offsetY = Math.abs(q % 2) * stepY();
    const rApprox = Math.round((cy - snapAnchorY() - offsetY) / HEX_H);
    for(let r = rApprox - 3; r <= rApprox + 3; r++){
      const pos = gridToPosition(q, r);
      const d = Math.hypot(pos.x - x, pos.y - y);
      if(!best || d < best.d) best = { x: pos.x, y: pos.y, d, q, r };
    }
  }
  return best;
}

function triggerSnapEffect(el){
  el.classList.remove('snap-flash');
  void el.offsetWidth;
  el.classList.add('snap-flash');
  setTimeout(()=>el.classList.remove('snap-flash'), 430);
  if(navigator.vibrate) navigator.vibrate([14, 18, 14]);
}

function triggerDropEffect(el){
  el.classList.remove('drop-flash');
  void el.offsetWidth;
  el.classList.add('drop-flash');
  setTimeout(()=>el.classList.remove('drop-flash'), 240);
}

function placeInitialCore(){
  const coords = {
    '一般的な意見': [3, 0],
    '筆者の主張': [4, 1],
    '根拠': [4, 2],
    '具体例': [3, 2],
    '結論': [2, 2]
  };
  coreItems.forEach(label => {
    const [q, r] = coords[label];
    const pos = gridToPosition(q, r);
    createBoardHex(label, 'core', pos.x, pos.y);
  });
}

function startTrayPointerDown(e){
  const rect = e.currentTarget.getBoundingClientRect();
  trayPending = {
    pointerId:e.pointerId,
    label:e.currentTarget.dataset.label,
    kind:e.currentTarget.dataset.kind,
    startX:e.clientX,
    startY:e.clientY,
    sourceEl:e.currentTarget,
    offsetX:e.clientX - rect.left,
    offsetY:e.clientY - rect.top,
    ghostEl:null,
    extracted:false
  };
  window.addEventListener('pointermove', onTrayPointerMove, {passive:false});
  window.addEventListener('pointerup', endTrayPointer);
  window.addEventListener('pointercancel', endTrayPointer);
}

function makeGhostFromTray(pending){
  const src = pending.sourceEl;
  const rect = src.getBoundingClientRect();
  const vp = viewport.getBoundingClientRect();
  const x = rect.left - vp.left - panX;
  const y = rect.top - vp.top - panY;
  const hex = createBoardHex(pending.label, pending.kind, x, y);
  hex.classList.add('from-tray');
  return hex;
}

function onTrayPointerMove(e){
  if(!trayPending || e.pointerId !== trayPending.pointerId) return;
  const dx = e.clientX - trayPending.startX;
  const dy = e.clientY - trayPending.startY;

  if(Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 6){
    endTrayPointer();
    return;
  }
  if(Math.hypot(dx,dy) < DRAG_THRESHOLD) return;

  e.preventDefault();

  if(!trayPending.ghostEl){
    trayPending.ghostEl = makeGhostFromTray(trayPending);
    beginDrag(e, trayPending.ghostEl, trayPending.offsetX, trayPending.offsetY);
  } else {
    dragState.clientX = e.clientX;
    dragState.clientY = e.clientY;
    if (Math.hypot(e.clientX - dragState.startClientX, e.clientY - dragState.startClientY) > 8) {
      dragState.moved = true;
    }
    if(!dragState.pending){
      dragState.pending = true;
      rafMove = requestAnimationFrame(applyDragFrame);
    }
  }

  const trayRight = tray.getBoundingClientRect().right;
  if(!trayPending.extracted && e.clientX > trayRight + 6){
    trayPending.extracted = true;
    if (trayPending.sourceEl && trayPending.sourceEl.isConnected) {
      trayPending.sourceEl.style.visibility = 'hidden';
    }
    if (trayPending.ghostEl) trayPending.ghostEl.classList.add('extracted');
  }
}

function endTrayPointer(e){
  window.removeEventListener('pointermove', onTrayPointerMove);
  window.removeEventListener('pointerup', endTrayPointer);
  window.removeEventListener('pointercancel', endTrayPointer);

  if(trayPending){
    if(!trayPending.extracted){
      if(trayPending.ghostEl && trayPending.ghostEl.isConnected){
        trayPending.ghostEl.remove();
      }
      if(trayPending.sourceEl && trayPending.sourceEl.isConnected){
        trayPending.sourceEl.style.visibility = '';
      }
      if(dragState && trayPending.ghostEl && dragState.hex === trayPending.ghostEl){
        dragState.hex.classList.remove('dragging','snap-candidate','from-tray','extracted');
        if (dragState.hex.releasePointerCapture && e) {
          try { dragState.hex.releasePointerCapture(e.pointerId); } catch(_) {}
        }
        dragState.hex.removeEventListener('pointermove', onDragMove);
        dragState.hex.removeEventListener('pointerup', endDrag);
        dragState.hex.removeEventListener('pointercancel', endDrag);
        dragState = null;
      }
    } else {
      if(trayPending.sourceEl && trayPending.sourceEl.isConnected){
        trayPending.sourceEl.remove();
      }
      if(trayPending.ghostEl) trayPending.ghostEl.classList.remove('from-tray','extracted');
    }
  }
  trayPending = null;
}

function startDragExisting(e){
  e.preventDefault();
  e.stopPropagation();
  const hex = e.currentTarget;
  const rect = hex.getBoundingClientRect();
  beginDrag(e, hex, e.clientX - rect.left, e.clientY - rect.top);
}

function beginDrag(e, hex, offsetX, offsetY){
  dragState = {
    hex, offsetX, offsetY, pointerId:e.pointerId,
    overTrash:false, clientX:e.clientX, clientY:e.clientY, pending:false,
    startClientX:e.clientX, startClientY:e.clientY, moved:false
  };
  hex.classList.add('dragging');
  hex.style.zIndex = ++zCounter;
  if(hex.setPointerCapture) hex.setPointerCapture(e.pointerId);
  hex.addEventListener('pointermove', onDragMove);
  hex.addEventListener('pointerup', endDrag);
  hex.addEventListener('pointercancel', endDrag);
}

function isOverTrash(clientX, clientY){
  const r = trash.getBoundingClientRect();
  return clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom;
}

function applyDragFrame(){
  rafMove = 0;
  if(!dragState) return;

  const overTrash = isOverTrash(dragState.clientX, dragState.clientY);
  dragState.overTrash = overTrash;
  trash.classList.toggle('active', overTrash);

  const p = pointerToWorkspace(dragState.clientX, dragState.clientY);
  const raw = constrain(p.x - dragState.offsetX, p.y - dragState.offsetY);

  const snap = candidateSnapPositions(raw.x, raw.y);
  let x = raw.x, y = raw.y;
  const canSnap = snap && snap.d <= snapRadius() && !overTrash;
  if(canSnap){
    const pull = Math.max(0.18, 1 - snap.d / snapRadius()) * 0.42;
    x = raw.x + (snap.x - raw.x) * pull;
    y = raw.y + (snap.y - raw.y) * pull;
  }

  dragState.hex.style.left = `${x}px`;
  dragState.hex.style.top = `${y}px`;
  dragState.hex.classList.toggle('snap-candidate', !!canSnap);
  dragState.pending = false;
}

function onDragMove(e){
  if(!dragState || e.pointerId !== dragState.pointerId) return;
  dragState.clientX = e.clientX;
  dragState.clientY = e.clientY;
  if (Math.hypot(e.clientX - dragState.startClientX, e.clientY - dragState.startClientY) > 8) {
    dragState.moved = true;
  }
  if(dragState.pending) return;
  dragState.pending = true;
  rafMove = requestAnimationFrame(applyDragFrame);
}

function endDrag(e){
  if(!dragState || e.pointerId !== dragState.pointerId) return;
  if(rafMove){
    cancelAnimationFrame(rafMove);
    rafMove = 0;
    applyDragFrame();
  }
  const {hex, overTrash} = dragState;
  const wasTap = !dragState.moved && !overTrash;
  trash.classList.remove('active');

  if(overTrash){
    if (hex.dataset.markerLocked !== '1') {
      addBackToTray(hex.dataset.label, hex.dataset.kind);
    }
    hex.remove();
  }else if(wasTap){
    if (rewriteMode && hex.dataset.coreEditable === '1') {
      openCoreEditor(hex, hex.dataset.label || '');
    } else {
      cycleMarker(hex);
    }
    triggerDropEffect(hex);
  }else{
    const x = parseFloat(hex.style.left) || 0;
    const y = parseFloat(hex.style.top) || 0;
    const snap = candidateSnapPositions(x, y);
    if(snap && snap.d <= snapRadius()){
      const pos = constrain(snap.x, snap.y);
      const moved = Math.abs(pos.x - x) > 1 || Math.abs(pos.y - y) > 1;
      hex.style.left = `${pos.x}px`;
      hex.style.top = `${pos.y}px`;
      if(moved) triggerSnapEffect(hex);
      else triggerDropEffect(hex);
    } else {
      const pos = constrain(x, y);
      hex.style.left = `${pos.x}px`;
      hex.style.top = `${pos.y}px`;
      triggerDropEffect(hex);
    }
  }

  hex.classList.remove('dragging','snap-candidate');
  if(hex.releasePointerCapture) hex.releasePointerCapture(e.pointerId);
  hex.removeEventListener('pointermove', onDragMove);
  hex.removeEventListener('pointerup', endDrag);
  hex.removeEventListener('pointercancel', endDrag);
  dragState = null;
}


function startPan(e){
  if (e.target.closest('.hex') || e.target.closest('#tray') || e.target.closest('#clearBtn') || e.target.closest('#trash')) return;
  panState = { pointerId:e.pointerId, startX:e.clientX, startY:e.clientY, originX:panX, originY:panY };
  viewport.classList.add('panning');
  if (viewport.setPointerCapture) viewport.setPointerCapture(e.pointerId);
}
function onPanMove(e){
  if (!panState || e.pointerId !== panState.pointerId) return;
  panX = panState.originX + (e.clientX - panState.startX);
  panY = panState.originY + (e.clientY - panState.startY);
  applyPan();
}
function endPan(e){
  if (!panState || e.pointerId !== panState.pointerId) return;
  viewport.classList.remove('panning');
  if (viewport.releasePointerCapture) viewport.releasePointerCapture(e.pointerId);
  panState = null;
}
viewport.addEventListener('pointerdown', startPan);
viewport.addEventListener('pointermove', onPanMove);
viewport.addEventListener('pointerup', endPan);
viewport.addEventListener('pointercancel', endPan);


editToggle.addEventListener('click', () => {
  rewriteMode = !rewriteMode;
  updateRewriteUI();
});

addCoreBtn.addEventListener('click', () => {
  if (!rewriteMode) return;
  openCoreEditor(null, '新規');
});

coreEditorOk.addEventListener('click', applyCoreEditor);
coreEditorCancel.addEventListener('click', closeCoreEditor);
coreEditorInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') applyCoreEditor();
  if (e.key === 'Escape') closeCoreEditor();
});
clearBtn.addEventListener('click', ()=>{
  workspace.innerHTML = '';
  panX = 0;
  panY = 0;
  applyPan();
  closeCoreEditor();
  fillTray();
  placeInitialCore();
});


document.addEventListener('dragstart', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
document.addEventListener('contextmenu', e => {
  if (e.target.closest('.hex') || e.target.closest('#viewport') || e.target.closest('#tray')) {
    e.preventDefault();
  }
});

fillTray();
applyPan();
placeInitialCore();
updateRewriteUI();
</script>
</body>
</html>
